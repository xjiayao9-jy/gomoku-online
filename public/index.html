<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>双人联网五子棋</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="play-area" aria-label="五子棋对局">
        <div class="topbar">
          <div>
            <p class="eyebrow">Gomoku Online</p>
            <h1>双人联网五子棋</h1>
          </div>
          <div class="connection-pill" id="connectionStatus">未连接</div>
        </div>

        <div class="game-status" id="gameStatus">输入昵称进入私人对局，前两位进入者自动成为黑棋和白棋。</div>

        <div class="timer-strip" aria-label="当前回合倒计时">
          <span id="turnLabel">等待进入</span>
          <strong id="topTurnTimer">--</strong>
        </div>

        <div class="board-shell">
          <canvas id="boardCanvas" width="900" height="900" aria-label="五子棋棋盘"></canvas>
        </div>

        <div class="confirm-move-card" id="confirmMoveCard" aria-live="polite">
          <div>
            <span>预览落点</span>
            <strong id="pendingMoveText">请选择位置</strong>
          </div>
          <div class="confirm-move-actions">
            <button class="secondary-button" id="cancelMoveButton" type="button">取消</button>
            <button class="primary-button" id="confirmMoveButton" type="button">确认落子</button>
          </div>
        </div>

        <div class="actions">
          <button class="icon-button" id="copyLinkButton" type="button" title="复制对局链接" aria-label="复制对局链接">
            <span aria-hidden="true">⛓</span>
          </button>
          <button class="icon-button" id="soundButton" type="button" title="关闭音效" aria-label="关闭音效">♪</button>
          <button class="primary-button" id="resetButton" type="button">再来一局</button>
        </div>
      </section>

      <aside class="side-panel" aria-label="房间和对局信息">
        <form class="room-form" id="playForm">
          <label>
            <span>昵称</span>
            <input id="nameInput" maxlength="18" autocomplete="name" placeholder="输入你的昵称" />
          </label>
          <button class="primary-button wide" id="enterButton" type="submit">进入对局</button>
        </form>

        <div class="room-card">
          <div class="room-meta">
            <span>私人对局</span>
            <strong id="matchStatus">未进入</strong>
          </div>
          <div class="players">
            <div class="player-row" id="blackPlayer">
              <span class="stone-dot black"></span>
              <div>
                <span class="player-label">黑棋</span>
                <strong>等待玩家</strong>
              </div>
            </div>
            <div class="player-row" id="whitePlayer">
              <span class="stone-dot white"></span>
              <div>
                <span class="player-label">白棋</span>
                <strong>等待玩家</strong>
              </div>
            </div>
          </div>
        </div>

        <div class="moves-card">
          <div class="panel-title">对局记录</div>
          <div class="stats-grid">
            <div>
              <span>手数</span>
              <strong id="moveCount">0</strong>
            </div>
            <div>
              <span>身份</span>
              <strong id="myRole">未入局</strong>
            </div>
            <div>
              <span>本手剩余</span>
              <strong id="turnTimer">--</strong>
            </div>
          </div>
          <ol class="move-list" id="moveList"></ol>
        </div>

        <div class="record-card">
          <div class="panel-title-row">
            <div class="panel-title">个人战绩</div>
            <button class="text-button" id="clearRecordButton" type="button">清空</button>
          </div>
          <div class="record-grid">
            <div>
              <span>胜 / 负 / 平</span>
              <strong id="recordWinsLosses">0 / 0 / 0</strong>
            </div>
            <div>
              <span>当前 Streak</span>
              <strong id="currentStreak">0</strong>
            </div>
            <div>
              <span>最高 Streak</span>
              <strong id="bestStreak">0</strong>
            </div>
          </div>
          <ol class="match-history" id="matchHistory"></ol>
        </div>

        <div class="chat-card">
          <div class="panel-title">对局消息</div>
          <div class="chat-log" id="chatLog"></div>
          <form class="chat-form" id="chatForm">
            <input id="chatInput" maxlength="120" autocomplete="off" placeholder="发一句话" />
            <button class="icon-button send" type="submit" title="发送" aria-label="发送">↗</button>
          </form>
        </div>
      </aside>
    </main>

    <div class="result-overlay" id="resultOverlay" aria-live="assertive" aria-modal="true" role="dialog">
      <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>
      <div class="result-card" id="resultCard">
        <p class="result-kicker" id="resultKicker">Game Over</p>
        <h2 id="resultTitle">本局结束</h2>
        <p id="resultMessage">五连达成。</p>
        <div class="result-actions">
          <button class="secondary-button" id="resultCloseButton" type="button">先看看棋盘</button>
          <button class="primary-button" id="resultResetButton" type="button">再来一局</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
